<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZonaRio | Apple Riobamba</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol"; }
        .scroll-smooth { scroll-behavior: smooth; }
        .insta-gradient { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
    </style>
</head>
<body class="bg-white text-[#1d1d1f] antialiased selection:bg-blue-100">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- TU FOTO DE INTERNET ---
        const IMAGEN_URL = "https://i.ibb.co/6R9bzsPn/audifnos.jpg";
        // --------------------------

        // --- ENLACE A TU INSTAGRAM ---
        const INSTAGRAM_URL = "https://www.instagram.com/_zonario_/";
        // --------------------------

        // --- ICONOS SVG ---
        const Icons = {
            Music: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>,
            Menu: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
            ArrowRight: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>,
            Zap: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
            Battery: ({className, size}) => <svg xmlns="http://www.w3.org/2000/svg" width={size || 24} height={size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="10" x="2" y="7" rx="2" ry="2"/><line x1="22" x2="22" y1="11" y2="13"/></svg>,
            ShoppingBag: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>,
            ShieldCheck: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>,
            Check: ({className, size}) => <svg xmlns="http://www.w3.org/2000/svg" width={size || 24} height={size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 6 9 17l-5-5"/></svg>,
            Smartphone: ({size}) => <svg xmlns="http://www.w3.org/2000/svg" width={size || 24} height={size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>,
            MapPin: ({className, size}) => <svg xmlns="http://www.w3.org/2000/svg" width={size || 24} height={size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>,
            Instagram: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
        };

        // --- COMPONENTE PRINCIPAL ---
        function App() {
            const [isScrolled, setIsScrolled] = useState(false);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 50);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollToSection = (id) => {
                setMobileMenuOpen(false);
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                }
            };

            return (
                <div className="font-sans">
                    
                    {/* NAVBAR */}
                    <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${isScrolled ? 'bg-white/80 backdrop-blur-md shadow-sm py-3' : 'bg-transparent py-5'}`}>
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center">
                                <div className="flex items-center cursor-pointer" onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})}>
                                    <span className="mr-2"><Icons.Music /></span>
                                    <span className="font-semibold text-lg tracking-tight">ZonaRio</span>
                                </div>
                                
                                <div className="hidden md:flex items-center space-x-8 text-xs font-medium text-gray-600">
                                    <button onClick={() => scrollToSection('features')} className="hover:text-black transition-colors">Especificaciones</button>
                                    <button onClick={() => scrollToSection('box')} className="hover:text-black transition-colors">Contenido</button>
                                    <button onClick={() => scrollToSection('process')} className="hover:text-black transition-colors">Entrega</button>
                                    <button onClick={() => scrollToSection('contact')} className="bg-black text-white px-4 py-1.5 rounded-full hover:bg-gray-800 transition-colors">Comprar</button>
                                </div>

                                <div className="md:hidden">
                                    <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="p-2">
                                        {mobileMenuOpen ? <Icons.X /> : <Icons.Menu />}
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Mobile Menu */}
                        <AnimatePresence>
                            {mobileMenuOpen && (
                                <motion.div initial={{ opacity: 0, height: 0 }} animate={{ opacity: 1, height: 'auto' }} exit={{ opacity: 0, height: 0 }} className="md:hidden bg-white border-b overflow-hidden">
                                    <div className="px-4 pt-2 pb-6 space-y-4">
                                        <button onClick={() => scrollToSection('features')} className="block w-full text-left py-2 text-sm font-medium border-b border-gray-100">Especificaciones</button>
                                        <button onClick={() => scrollToSection('box')} className="block w-full text-left py-2 text-sm font-medium border-b border-gray-100">Contenido</button>
                                        <button onClick={() => scrollToSection('process')} className="block w-full text-left py-2 text-sm font-medium border-b border-gray-100">Entrega en Riobamba</button>
                                        <button onClick={() => scrollToSection('contact')} className="block w-full text-center py-3 mt-4 bg-blue-600 text-white rounded-lg font-medium">Comprar Ahora</button>
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </nav>

                    {/* HERO SECTION */}
                    <section className="relative pt-32 pb-16 md:pt-48 md:pb-32 overflow-hidden bg-white">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                            <motion.div initial={{ opacity: 0, y: 30 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.8 }}>
                                <h2 className="text-xl md:text-2xl font-semibold text-blue-600 mb-2">2.ª Generación</h2>
                                <h1 className="text-5xl md:text-8xl font-bold tracking-tight mb-6 text-black">AirPods Pro</h1>
                                <p className="text-xl md:text-2xl text-gray-500 max-w-2xl mx-auto mb-10 font-medium leading-relaxed">
                                    Reconstruidos desde el sonido. <br/>
                                    Ahora disponibles en <span className="text-black">Riobamba</span>.
                                </p>
                                <div className="flex flex-col sm:flex-row justify-center gap-4 mb-16">
                                    {/* AQUI SE HIZO EL CAMBIO 1 */}
                                    <button onClick={() => scrollToSection('contact')} className="bg-blue-600 text-white px-8 py-3 rounded-full font-medium hover:bg-blue-700 transition-colors shadow-lg shadow-blue-500/30">Comprar ahora</button>
                                    
                                    <button onClick={() => scrollToSection('features')} className="text-blue-600 hover:text-blue-800 px-8 py-3 font-medium flex items-center justify-center group">
                                        Ver características <span className="ml-1 group-hover:ml-2 transition-all">›</span>
                                    </button>
                                </div>
                            </motion.div>

                            <motion.div initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} transition={{ delay: 0.4, duration: 1 }} className="relative">
                                <div className="relative w-full max-w-2xl mx-auto h-64 md:h-[400px] bg-white flex items-center justify-center overflow-visible">
                                    <img 
                                        src={IMAGEN_URL} 
                                        alt="AirPods Pro 2da Generación" 
                                        className="object-contain w-full h-full drop-shadow-2xl hover:scale-105 transition-transform duration-700"
                                    />
                                </div>
                                <p className="mt-4 text-xs text-gray-400 font-medium tracking-wide">CALIDAD PROFESIONAL • RIOBAMBA</p>
                            </motion.div>
                        </div>
                    </section>

                    {/* FEATURES */}
                    <section id="features" className="py-24 bg-[#f5f5f7]">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-16">
                                <h2 className="text-4xl md:text-5xl font-bold mb-4">Audio. Magia. Inmersión.</h2>
                                <p className="text-gray-500 text-lg">Tecnología de punta en tus oídos.</p>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <motion.div whileHover={{ y: -5 }} className="bg-white p-10 rounded-[30px] shadow-sm col-span-1 md:col-span-2 flex flex-col justify-between overflow-hidden relative group">
                                    <div className="z-10 relative">
                                        <p className="font-semibold text-gray-500 mb-2">Cancelación de Ruido</p>
                                        <h3 className="text-3xl font-bold mb-4">Silencio más inteligente.</h3>
                                        <p className="text-gray-600 leading-relaxed max-w-md">Hasta 2 veces más Cancelación Activa de Ruido que la generación anterior.</p>
                                    </div>
                                    <div className="mt-8 flex justify-end"><div className="bg-gray-100 p-4 rounded-full"><Icons.Zap className="w-12 h-12 text-gray-800" /></div></div>
                                </motion.div>
                                <motion.div whileHover={{ y: -5 }} className="bg-white p-10 rounded-[30px] shadow-sm flex flex-col justify-between">
                                    <div>
                                        <p className="font-semibold text-gray-500 mb-2">Batería</p>
                                        <h3 className="text-3xl font-bold mb-4">Autonomía total.</h3>
                                        <p className="text-gray-600">Hasta 6 horas de audio con una sola carga.</p>
                                    </div>
                                    <div className="mt-10 flex justify-center text-green-500"><Icons.Battery size={64} className="animate-pulse" /></div>
                                </motion.div>
                                <motion.div whileHover={{ y: -5 }} className="bg-black text-white p-10 rounded-[30px] shadow-sm md:col-span-1 flex flex-col justify-between">
                                    <div>
                                        <p className="font-semibold text-gray-400 mb-2">Estuche MagSafe</p>
                                        <h3 className="text-3xl font-bold mb-4">Poder en tu bolsillo.</h3>
                                    </div>
                                    <div className="mt-4 flex justify-center"><Icons.ShoppingBag className="w-16 h-16 text-white opacity-80" /></div>
                                </motion.div>
                                <motion.div whileHover={{ y: -5 }} className="bg-white p-10 rounded-[30px] shadow-sm col-span-1 md:col-span-2 flex flex-col md:flex-row items-center gap-8">
                                    <div className="flex-1">
                                        <p className="font-semibold text-blue-600 mb-2">Ajuste Personalizado</p>
                                        <h3 className="text-3xl font-bold mb-4">Comodidad que se siente.</h3>
                                        <p className="text-gray-600 leading-relaxed">Incluye 4 pares de almohadillas de silicona para adaptarse a todos los oídos.</p>
                                    </div>
                                    <div className="flex space-x-2">
                                        {[1,2,3,4].map((i) => <div key={i} className={`w-${i*3 + 4} h-${i*3 + 4} rounded-full bg-gray-200 border-2 border-white shadow-inner`}></div>)}
                                    </div>
                                </motion.div>
                            </div>
                        </div>
                    </section>

                    {/* WHATS IN THE BOX */}
                    <section id="box" className="py-24 bg-white">
                        <div className="max-w-4xl mx-auto px-4 text-center">
                            <h2 className="text-3xl md:text-4xl font-bold mb-12">Lo que incluye tu compra</h2>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-8">
                                {[
                                    { name: "AirPods Pro", icon: <Icons.Music className="w-8 h-8"/>, desc: "2.ª Generación" },
                                    { name: "Estuche MagSafe", icon: <Icons.ShoppingBag className="w-8 h-8"/>, desc: "Con altavoz" },
                                    { name: "Cable USB-C", icon: <Icons.Zap className="w-8 h-8"/>, desc: "Carga rápida" },
                                    { name: "Almohadillas", icon: <Icons.ShieldCheck className="w-8 h-8"/>, desc: "XS, S, M, L" },
                                ].map((item, idx) => (
                                    <motion.div key={idx} initial={{ opacity: 0, y: 20 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true }} transition={{ delay: idx * 0.1 }} className="flex flex-col items-center">
                                        <div className="w-20 h-20 bg-gray-50 rounded-2xl flex items-center justify-center mb-4 text-gray-800 shadow-sm border border-gray-100">
                                            {item.icon}
                                        </div>
                                        <h4 className="font-semibold text-lg">{item.name}</h4>
                                        <p className="text-sm text-gray-500">{item.desc}</p>
                                    </motion.div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* LOCAL TRUST */}
                    <section id="process" className="py-20 bg-blue-50 border-y border-blue-100">
                        <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex flex-col md:flex-row items-center gap-12">
                                <div className="flex-1 space-y-6">
                                    <h2 className="text-3xl md:text-4xl font-bold text-gray-900">Compra local.<br/><span className="text-blue-600">Sin riesgos.</span></h2>
                                    <p className="text-lg text-gray-600">Somos de Riobamba, como tú. Olvídate de envíos largos o depositar a desconocidos.</p>
                                    <ul className="space-y-4">
                                        <li className="flex items-start"><div className="mt-1 bg-blue-100 p-1 rounded-full mr-3"><Icons.Check size={16} className="text-blue-600"/></div><div><strong className="block text-gray-900">Entrega personal</strong><span className="text-gray-500">Nos reunimos en un lugar seguro.</span></div></li>
                                        <li className="flex items-start"><div className="mt-1 bg-blue-100 p-1 rounded-full mr-3"><Icons.Check size={16} className="text-blue-600"/></div><div><strong className="block text-gray-900">Pago contra entrega</strong><span className="text-gray-500">Pagas al recibir.</span></div></li>
                                        <li className="flex items-start"><div className="mt-1 bg-blue-100 p-1 rounded-full mr-3"><Icons.Check size={16} className="text-blue-600"/></div><div><strong className="block text-gray-900">Entrega hoy mismo</strong><span className="text-gray-500">Coordinamos la hora que te convenga.</span></div></li>
                                    </ul>
                                </div>
                                <div className="flex-1 bg-white p-4 pb-6 rounded-3xl shadow-xl transform rotate-2 hover:rotate-0 transition-transform duration-500 border border-gray-100 max-w-sm w-full">
                                    <div className="flex items-center space-x-4 mb-4 px-2 pt-2">
                                        <div className="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center"><Icons.MapPin className="text-blue-600"/></div>
                                        <div><p className="text-xs font-semibold text-gray-400 uppercase tracking-wider">Zona de Cobertura</p><p className="text-lg font-bold text-gray-800">Riobamba, Ecuador</p></div>
                                    </div>
                                    <div className="h-48 w-full bg-gray-50 rounded-2xl overflow-hidden relative shadow-inner border border-gray-100">
                                        <div className="absolute inset-0 opacity-10" style={{backgroundImage: 'radial-gradient(circle, #000000 1px, transparent 1px)', backgroundSize: '20px 20px'}}></div>
                                        <div className="absolute inset-0 flex items-center justify-center">
                                            <div className="bg-white p-4 rounded-full shadow-2xl animate-bounce z-10 border border-gray-100"><Icons.MapPin className="text-red-500 fill-red-500" size={32} /></div>
                                            <div className="absolute w-20 h-20 bg-blue-500 rounded-full opacity-10 animate-ping"></div>
                                        </div>
                                    </div>
                                    <div className="mt-4 text-center"><span className="inline-block px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-semibold">Disponible Ahora</span></div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* CONTACT - SECCION ACTUALIZADA PARA INSTAGRAM */}
                    <section id="contact" className="py-24 bg-white relative overflow-hidden">
                        <div className="max-w-3xl mx-auto px-4 text-center relative z-10">
                            <h2 className="text-4xl font-bold mb-4">¿Listo para tener los tuyos?</h2>
                            <p className="text-xl text-gray-500 mb-12">Escríbenos directamente a Instagram para coordinar la entrega.</p>
                            
                            <div className="flex justify-center">
                                <a href={INSTAGRAM_URL} target="_blank" rel="noopener noreferrer" 
                                   className="insta-gradient inline-flex items-center justify-center px-10 py-5 text-xl font-bold text-white rounded-full hover:shadow-2xl hover:scale-105 transition-all duration-300 shadow-lg group">
                                    <Icons.Instagram className="w-8 h-8 mr-3"/>
                                    {/* AQUI SE HIZO EL CAMBIO 2 */}
                                    Cómpralos ahora
                                    <span className="ml-3 group-hover:translate-x-1 transition-transform"><Icons.ArrowRight className="w-6 h-6"/></span>
                                </a>
                            </div>

                            <p className="mt-8 text-sm text-gray-400">Te responderemos enseguida por DM.</p>
                        </div>
                    </section>

                    {/* FOOTER */}
                    <footer className="bg-[#f5f5f7] py-12 border-t border-gray-200">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-xs text-gray-500">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8 border-b border-gray-300 pb-8">
                                <div><h5 className="font-semibold text-gray-900 mb-2">Sobre el producto</h5><p className="mb-2">AirPods Pro (2.ª gen) con estuche MagSafe (USB-C).</p><p>Calidad OEM / Importación directa.</p></div>
                                <div><h5 className="font-semibold text-gray-900 mb-2">Métodos de Pago</h5><p>Efectivo contra entrega.</p><p>Transferencia Bancaria.</p></div>
                                <div><h5 className="font-semibold text-gray-900 mb-2">Síguenos</h5><a href={INSTAGRAM_URL} className="hover:text-blue-600 transition-colors font-medium">@_zonario_ en Instagram</a></div>
                            </div>
                            <div className="flex flex-col md:flex-row justify-between items-center">
                                <p>Copyright © 2025 ZonaRio.</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
